name: Redis API Deploy (AWS Lambda)

on:
  push:
    branches: [main, master]
    paths:
      - redis-api-server/**
      - .github/workflows/api-deploy.yml

env:
  NODE_VERSION: '22.x'
  AWS_REGION: us-east-2
  AWS_API_DEPLOY_ROLE_ARN: arn:aws:iam::381492289909:role/GitHubActionsApiDeploy
  LAMBDA_FUNCTION_NAME: portfolio-redis-api
  LAMBDA_RUNTIME: nodejs22.x

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: redis-api-server/package-lock.json

      - name: Install dependencies (prod only)
        working-directory: redis-api-server
        run: npm ci --omit=dev

      - name: Package Lambda zip
        run: |
          cd redis-api-server
          zip -r ../redis-api-lambda.zip . \
            -x ".env" \
            -x "node_modules/.cache/*" \
            -x "setup.ps1" \
            -x "README.md" \
            -x ".gitignore"

      - name: Configure AWS credentials (GitHub OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_API_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify required Lambda email/scheduler env vars
        run: |
          set -euo pipefail
          set +e
          VARS_JSON="$(aws lambda get-function-configuration \
            --function-name "${LAMBDA_FUNCTION_NAME}" \
            --query 'Environment.Variables' \
            --output json 2>/tmp/lambda-get-config.err)"
          GET_CFG_EXIT=$?
          set -e

          if [ "$GET_CFG_EXIT" -ne 0 ]; then
            echo "::warning::Skipping required env var validation; unable to read Lambda config with current deploy role."
            cat /tmp/lambda-get-config.err || true
            exit 0
          fi

          REQUIRED_KEYS=(
            "SES_FROM_EMAIL"
            "SCHEDULER_INVOKE_ROLE_ARN"
            "SCHEDULER_TARGET_LAMBDA_ARN"
          )

          MISSING=()
          for KEY in "${REQUIRED_KEYS[@]}"; do
            VALUE="$(echo "${VARS_JSON}" | jq -r --arg k "${KEY}" '.[$k] // ""')"
            if [ -z "${VALUE}" ] || [ "${VALUE}" = "null" ]; then
              MISSING+=("${KEY}")
            fi
          done

          if [ "${#MISSING[@]}" -gt 0 ]; then
            echo "::error::Lambda ${LAMBDA_FUNCTION_NAME} missing required env vars: ${MISSING[*]}"
            exit 1
          fi

          echo "Required Lambda env vars present."

      - name: Check Lambda runtime
        id: runtime_check
        run: |
          RUNTIME="$(aws lambda get-function-configuration \
            --function-name "${LAMBDA_FUNCTION_NAME}" \
            --query 'Runtime' \
            --output text || echo unknown)"
          echo "runtime=${RUNTIME}" >> "$GITHUB_OUTPUT"
          echo "Detected runtime: ${RUNTIME}"
          if [ "${RUNTIME}" = "nodejs20.x" ]; then
            echo "::warning::Lambda runtime is nodejs20.x (AWS Lambda deprecates it on 2026-04-30; updates blocked after 2026-09-30)."
          fi

      - name: Attempt runtime upgrade (non-blocking)
        if: steps.runtime_check.outputs.runtime != env.LAMBDA_RUNTIME
        run: |
          set +e
          aws lambda update-function-configuration \
            --function-name "${LAMBDA_FUNCTION_NAME}" \
            --runtime "${LAMBDA_RUNTIME}"
          UPDATE_EXIT=$?
          if [ "$UPDATE_EXIT" -eq 0 ]; then
            aws lambda wait function-updated --function-name "${LAMBDA_FUNCTION_NAME}"
            echo "Runtime updated to ${LAMBDA_RUNTIME}"
          else
            echo "::warning::Could not auto-update runtime to ${LAMBDA_RUNTIME}. Ensure deploy role has lambda:UpdateFunctionConfiguration."
          fi
          exit 0

      - name: Deploy to Lambda
        run: |
          aws lambda update-function-code \
            --function-name "${LAMBDA_FUNCTION_NAME}" \
            --zip-file "fileb://redis-api-lambda.zip"
          # The GitHub deploy role can update code but does not have the waiter read permissions.
          # Give Lambda a short head start, then let the publish step retry until the update settles.
          sleep 5

      - name: Publish version and move live alias
        run: |
          set -euo pipefail

          VERSION=""
          for attempt in $(seq 1 24); do
            set +e
            VERSION="$(aws lambda publish-version \
              --function-name "${LAMBDA_FUNCTION_NAME}" \
              --description "GitHub Actions deploy ${GITHUB_SHA}" \
              --query 'Version' \
              --output text 2>/tmp/publish-version.err)"
            STATUS=$?
            set -e

            if [ "$STATUS" -eq 0 ] && [ -n "${VERSION}" ] && [ "${VERSION}" != "None" ]; then
              break
            fi

            if grep -q "ResourceConflictException" /tmp/publish-version.err; then
              echo "Lambda update still in progress. Retry ${attempt}/24..."
              sleep 5
              continue
            fi

            cat /tmp/publish-version.err
            exit "$STATUS"
          done

          if [ -z "${VERSION}" ] || [ "${VERSION}" = "None" ]; then
            echo "::error::Unable to publish a Lambda version after waiting for the code update to settle."
            cat /tmp/publish-version.err || true
            exit 1
          fi

          echo "Published version: ${VERSION}"

          if aws lambda get-alias --function-name "${LAMBDA_FUNCTION_NAME}" --name live >/dev/null 2>&1; then
            aws lambda update-alias \
              --function-name "${LAMBDA_FUNCTION_NAME}" \
              --name live \
              --function-version "${VERSION}"
          else
            aws lambda create-alias \
              --function-name "${LAMBDA_FUNCTION_NAME}" \
              --name live \
              --function-version "${VERSION}" \
              --description "Provisioned alias for public API"
          fi

      - name: Verify live alias target
        run: |
          aws lambda get-alias \
            --function-name "${LAMBDA_FUNCTION_NAME}" \
            --name live \
            --query '{Name:Name,FunctionVersion:FunctionVersion}' \
            --output json
