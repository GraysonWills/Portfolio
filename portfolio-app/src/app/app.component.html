<div class="app-container">
  <app-header></app-header>
  <div class="preview-banner" *ngIf="previewModeActive" role="status" aria-live="polite">
    <span>Preview mode is active. You are viewing draft content from authoring.</span>
    <button type="button" class="preview-exit" (click)="exitPreviewMode()">Exit preview</button>
  </div>
  <main id="main-content" class="main-content" role="main" tabindex="-1" [@routeTransition]="getRouteAnimationData(outlet)">
    <router-outlet #outlet="outlet"></router-outlet>
  </main>
  <app-footer></app-footer>

  <div
    class="subscribe-modal-backdrop"
    *ngIf="showSubscribePrompt"
    (click)="dismissSubscribePrompt()"
    aria-hidden="true"></div>

  <section
    class="subscribe-modal"
    *ngIf="showSubscribePrompt"
    role="dialog"
    aria-modal="true"
    aria-labelledby="subscribe-modal-title">
    <button type="button" class="subscribe-modal-close" (click)="dismissSubscribePrompt()" aria-label="Close">×</button>
    <div class="subscribe-modal-content">
      <h2 id="subscribe-modal-title">Stay Updated</h2>
      <p>Get an email when a new blog post goes live. Confirm once, unsubscribe anytime.</p>
      <div class="subscribe-modal-form">
        <input
          type="email"
          pInputText
          [(ngModel)]="subscribePromptEmail"
          (keyup.enter)="submitSubscribePrompt()"
          placeholder="you@example.com"
          class="subscribe-modal-input"
          aria-label="Email address for blog updates" />
        <button
          type="button"
          class="subscribe-modal-submit"
          (click)="submitSubscribePrompt()"
          [disabled]="isSubscribePromptSubmitting"
          [attr.aria-busy]="isSubscribePromptSubmitting ? 'true' : 'false'">
          {{ isSubscribePromptSubmitting ? 'Sending...' : 'Subscribe' }}
        </button>
      </div>
      <button type="button" class="subscribe-modal-dismiss" (click)="dismissSubscribePrompt()">No Thanks</button>
    </div>
  </section>

  <p-toast position="bottom-right" [life]="4000"></p-toast>
</div>
