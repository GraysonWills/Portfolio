<button type="button" class="float-btn" (click)="support.open()" aria-label="Support my work">
  <span class="float-icon">
    <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.9"><path d="M4 8h13v5a4 4 0 0 1-4 4H8a4 4 0 0 1-4-4V8z"/><path d="M17 9h2a2 2 0 0 1 0 4h-2"/><path d="M7 3v2M11 3v2"/></svg>
  </span>
  <span class="float-text">
    <span class="float-title">Support My Work</span>
    <span class="float-sub">Buy me a coffee →</span>
  </span>
</button>

<div class="modal-backdrop" *ngIf="support.isOpen" (click)="support.close()">
  <div class="modal" (click)="$event.stopPropagation()">
    <div class="modal-icon">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8"><path d="M4 8h13v5a4 4 0 0 1-4 4H8a4 4 0 0 1-4-4V8z"/><path d="M17 9h2a2 2 0 0 1 0 4h-2"/><path d="M7 3v2M11 3v2"/></svg>
    </div>
    <div class="modal-title">Support the work</div>
    <p class="modal-body">Everything here — the writing, the tools, the open projects — is free. If it's been useful, a coffee helps keep it going and ad-free.</p>
    <div class="tiers">
      <div class="tier"><div class="amt">$3</div><div class="lbl">a coffee</div></div>
      <div class="tier featured"><div class="amt">$5</div><div class="lbl warm">a big one</div></div>
      <div class="tier"><div class="amt">$15</div><div class="lbl">a round</div></div>
    </div>
    <a class="cta" [href]="coffeeUrl" target="_blank" rel="noopener">Open Buy Me a Coffee →</a>
    <button type="button" class="later" (click)="support.close()">Maybe later</button>
  </div>
</div>
