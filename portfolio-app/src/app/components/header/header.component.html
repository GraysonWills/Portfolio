<header class="header-container" [class.scrolled]="isScrolled" role="banner">
  <nav class="nav-bar" aria-label="Main navigation">
    <!-- Logo -->
    <a routerLink="/" class="logo-container" aria-label="Go to homepage">
      <img *ngIf="getHeaderIcon()" [src]="getHeaderIcon()" alt="Grayson Wills logo" class="logo-image" />
      <span *ngIf="!getHeaderIcon()" class="logo-mark" aria-hidden="true">GW</span>
      <span class="logo-text">{{ getHeaderText() }}</span>
    </a>

    <!-- Desktop Nav -->
    <ul class="nav-links desktop-only" role="list">
      <li *ngFor="let item of navMenuItems" role="listitem">
        <a [routerLink]="item.routerLink"
           class="nav-link"
           [class.active]="item.styleClass === 'active-route'"
           [attr.aria-current]="item.styleClass === 'active-route' ? 'page' : null">
          <span>{{ item.label }}</span>
        </a>
      </li>
    </ul>

    <!-- Desktop Actions -->
    <div class="header-actions desktop-only">
      <a routerLink="/blog" class="action-subscribe" aria-label="Subscribe to the blog">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" aria-hidden="true"><path d="M4 6h16v12H4z"/><path d="M4 7l8 6 8-6"/></svg>
        <span>Subscribe</span>
      </a>
      <a routerLink="/account" class="action-signin">{{ siteUser ? 'Account' : 'Sign In' }}</a>

      <!-- Desktop Contact Icons -->
      <div class="contact-icons" role="list" aria-label="Contact links">
        <a [href]="'mailto:' + contactInfo.email" class="contact-link" aria-label="Send email" role="listitem">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg>
        </a>
        <a [href]="'https://' + contactInfo.linkedin" target="_blank" rel="noopener noreferrer" class="contact-link" aria-label="LinkedIn profile" role="listitem">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M4.98 3.5A2.5 2.5 0 1 1 5 8.5a2.5 2.5 0 0 1 0-5zM3 9h4v12H3zM10 9h3.8v1.7h.05c.53-1 1.83-2.05 3.77-2.05C21.4 8.65 22 11 22 14.1V21h-4v-6.1c0-1.45-.03-3.3-2-3.3-2 0-2.3 1.57-2.3 3.2V21h-4z"/></svg>
        </a>
        <a *ngIf="contactInfo.github" [href]="getGithubUrl()" target="_blank" rel="noopener noreferrer" class="contact-link" aria-label="GitHub profile" role="listitem">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 2C6.48 2 2 6.58 2 12.25c0 4.53 2.87 8.37 6.84 9.73.5.1.68-.22.68-.49l-.01-1.9c-2.78.62-3.37-1.2-3.37-1.2-.46-1.18-1.11-1.5-1.11-1.5-.9-.63.07-.62.07-.62 1 .07 1.53 1.06 1.53 1.06.9 1.56 2.34 1.11 2.91.85.09-.66.35-1.11.63-1.36-2.22-.26-4.55-1.14-4.55-5.06 0-1.12.39-2.03 1.03-2.75-.1-.26-.45-1.3.1-2.71 0 0 .84-.27 2.75 1.05a9.4 9.4 0 0 1 5 0c1.91-1.32 2.75-1.05 2.75-1.05.55 1.41.2 2.45.1 2.71.64.72 1.03 1.63 1.03 2.75 0 3.93-2.34 4.79-4.57 5.05.36.32.68.94.68 1.9l-.01 2.82c0 .27.18.6.69.49A10.26 10.26 0 0 0 22 12.25C22 6.58 17.52 2 12 2z"/></svg>
        </a>
      </div>
    </div>

    <!-- Mobile Hamburger -->
    <button class="hamburger mobile-only"
            (click)="toggleMobileMenu()"
            [attr.aria-expanded]="mobileMenuOpen"
            aria-label="Toggle navigation menu">
      <span class="hamburger-line" [class.open]="mobileMenuOpen"></span>
      <span class="hamburger-line" [class.open]="mobileMenuOpen"></span>
      <span class="hamburger-line" [class.open]="mobileMenuOpen"></span>
    </button>
  </nav>

  <!-- Mobile Drawer Overlay -->
  <div class="mobile-overlay"
       [class.open]="mobileMenuOpen"
       (click)="closeMobileMenu()"
       aria-hidden="true"></div>

  <!-- Mobile Drawer -->
  <aside class="mobile-drawer" [class.open]="mobileMenuOpen" role="dialog" aria-label="Mobile navigation">
    <ul class="mobile-nav-links" role="list">
      <li *ngFor="let item of menuItems" role="listitem">
        <a [routerLink]="item.routerLink"
           class="mobile-nav-link"
           [class.active]="item.styleClass === 'active-route'"
           (click)="closeMobileMenu()">
          <span>{{ item.label }}</span>
        </a>
      </li>
    </ul>
    <div class="mobile-actions">
      <a routerLink="/blog" class="action-subscribe" (click)="closeMobileMenu()" aria-label="Subscribe to the blog">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" aria-hidden="true"><path d="M4 6h16v12H4z"/><path d="M4 7l8 6 8-6"/></svg>
        <span>Subscribe</span>
      </a>
    </div>
    <div class="mobile-contact" role="list" aria-label="Contact links">
      <a [href]="'mailto:' + contactInfo.email" class="contact-link" aria-label="Send email" role="listitem">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg>
      </a>
      <a [href]="'https://' + contactInfo.linkedin" target="_blank" rel="noopener noreferrer" class="contact-link" aria-label="LinkedIn profile" role="listitem">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M4.98 3.5A2.5 2.5 0 1 1 5 8.5a2.5 2.5 0 0 1 0-5zM3 9h4v12H3zM10 9h3.8v1.7h.05c.53-1 1.83-2.05 3.77-2.05C21.4 8.65 22 11 22 14.1V21h-4v-6.1c0-1.45-.03-3.3-2-3.3-2 0-2.3 1.57-2.3 3.2V21h-4z"/></svg>
      </a>
      <a *ngIf="contactInfo.github" [href]="getGithubUrl()" target="_blank" rel="noopener noreferrer" class="contact-link" aria-label="GitHub profile" role="listitem">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 2C6.48 2 2 6.58 2 12.25c0 4.53 2.87 8.37 6.84 9.73.5.1.68-.22.68-.49l-.01-1.9c-2.78.62-3.37-1.2-3.37-1.2-.46-1.18-1.11-1.5-1.11-1.5-.9-.63.07-.62.07-.62 1 .07 1.53 1.06 1.53 1.06.9 1.56 2.34 1.11 2.91.85.09-.66.35-1.11.63-1.36-2.22-.26-4.55-1.14-4.55-5.06 0-1.12.39-2.03 1.03-2.75-.1-.26-.45-1.3.1-2.71 0 0 .84-.27 2.75 1.05a9.4 9.4 0 0 1 5 0c1.91-1.32 2.75-1.05 2.75-1.05.55 1.41.2 2.45.1 2.71.64.72 1.03 1.63 1.03 2.75 0 3.93-2.34 4.79-4.57 5.05.36.32.68.94.68 1.9l-.01 2.82c0 .27.18.6.69.49A10.26 10.26 0 0 0 22 12.25C22 6.58 17.52 2 12 2z"/></svg>
      </a>
    </div>
    <a routerLink="/account" class="mobile-signin" (click)="closeMobileMenu()">{{ siteUser ? 'Account' : 'Sign In' }}</a>
  </aside>
</header>
