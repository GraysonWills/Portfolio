<div class="mc-page">
  <app-studio-shell active="mission-control" [apiConnected]="true"></app-studio-shell>

  <div class="mc-cockpit">
    <div class="mc-head">
      <div>
        <div class="mc-title-row">
          <span class="mc-live-dot"></span>
          <h2 class="mc-title">Mission Control</h2>
          <span class="mc-ver">MC · v1</span>
        </div>
        <p class="mc-sub">The worker mesh, live — one operator's cockpit for the golden-path pipeline.</p>
      </div>
      <div class="mc-head-actions">
        <button class="mc-btn-ghost" type="button">Sync from manifests</button>
        <button
          class="mc-btn-edit"
          [class.on]="editMode"
          type="button"
          (click)="toggleEdit()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>
          {{ editMode ? 'Exit edit' : 'Edit Mesh' }}
        </button>
      </div>
    </div>

    <div class="mc-subnav">
      <button
        *ngFor="let t of tabs"
        type="button"
        class="mc-tab"
        [class.active]="view === t.key"
        (click)="setView(t.key)">
        {{ t.label }}
      </button>
      <span class="mc-endpoints">GET /jobs · /batches · /approvals · /events/stream</span>
    </div>

    <app-mc-board *ngIf="view === 'board'"
                  (openJob)="onOpenJob($event)"
                  (openApprovals)="setView('approvals')"
                  (openBatches)="setView('batches')"></app-mc-board>
    <app-mc-topology *ngIf="view === 'topology'" [editMode]="editMode"></app-mc-topology>
    <app-mc-feed *ngIf="view === 'feed'" (openJob)="onOpenJob($event)"></app-mc-feed>
    <app-mc-jobs *ngIf="view === 'jobs'" [cid]="jobCid"></app-mc-jobs>
    <app-mc-batches *ngIf="view === 'batches'"
                    (openJob)="onOpenJob($event)"
                    (openApprovals)="setView('approvals')"></app-mc-batches>
    <app-mc-approvals *ngIf="view === 'approvals'"></app-mc-approvals>
    <app-mc-registry *ngIf="view === 'registry'"></app-mc-registry>
  </div>
</div>
